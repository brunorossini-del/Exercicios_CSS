<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelateria Cadastro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top, #1b294b 0%, #05070f 70%);
    font-family:'Poppins', sans-serif;
    overflow:hidden;
    position:relative;
}

/* FUNDO */

body::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:130px;
    background:#4d210d;
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
    clip-path: polygon(
    0 0,
    100% 0,
    100% 60%,
    96% 100%,
    92% 65%,
    87% 100%,
    82% 60%,
    75% 100%,
    68% 65%,
    60% 100%,
    52% 60%,
    45% 100%,
    38% 60%,
    30% 100%,
    23% 60%,
    16% 100%,
    10% 65%,
    4% 100%,
    0 60%
    );
    box-shadow:0 0 30px #6b3218;
}

.wave{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:180px;
    background:#0d1835;
    border-top-left-radius:50% 100px;
    border-top-right-radius:50% 100px;
    opacity:0.8;
}

/* CONTAINER */

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:90px;
    padding:40px;
    position:relative;
    z-index:10;
}

/* LADO ESQUERDO */

.left{
    color:#d59a62;
    text-align:center;
}

.logo{
    font-size:150px;
    margin-bottom:10px;
    filter:drop-shadow(0 0 10px rgba(213,154,98,0.3));
}

.left h1{
    font-family:'Cinzel', serif;
    font-size:110px;
    font-weight:500;
    line-height:1;
    text-shadow:0 0 20px rgba(213,154,98,0.2);
}

.divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin:25px 0;
}

.divider span{
    width:110px;
    height:2px;
    background:#a86f45;
}

.divider i{
    font-size:22px;
}

.left p{
    font-size:22px;
    letter-spacing:4px;
    line-height:1.6;
}

/* CARD */

.card{
    width:620px;
    background:rgba(10,10,10,0.75);
    backdrop-filter:blur(10px);
    border-radius:35px;
    padding:50px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(213,154,98,0.15);
    box-shadow:
    0 0 40px rgba(0,0,0,0.7),
    inset 0 0 25px rgba(255,255,255,0.02);
}

/* CHOCOLATE */

.card::before{
    content:'';
    position:absolute;
    top:0;
    right:0;
    width:220px;
    height:130px;
    background:#4d210d;
    border-bottom-left-radius:40px;
    clip-path: polygon(
    0 0,
    100% 0,
    100% 70%,
    85% 100%,
    72% 60%,
    58% 100%,
    45% 60%,
    30% 100%,
    15% 60%,
    0 100%
    );
    box-shadow:0 0 25px #5a2a12;
}

/* TITULO */

.card h2{
    font-family:'Cinzel', serif;
    color:#d59a62;
    font-size:70px;
    text-align:center;
    font-weight:500;
    margin-bottom:10px;
}

.top-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:40px;
}

.top-divider span{
    width:90px;
    height:2px;
    background:#a86f45;
}

.top-divider i{
    color:#d59a62;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:28px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

label{
    color:#d59a62;
    font-size:18px;
}

.input-box{
    width:100%;
    height:65px;
    border:2px solid #16274d;
    border-radius:16px;
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:18px;
    background:rgba(0,0,0,0.25);
}

.input-box i{
    color:#d59a62;
    font-size:22px;
}

.input-box input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:#fff;
    font-size:20px;
}

.input-box input::placeholder{
    color:#777;
}

/* BOTÃO */

button{
    width:100%;
    height:78px;
    margin-top:20px;
    border:none;
    border-radius:22px;
    background:#5b2711;
    color:#f0d0b2;
    font-size:30px;
    font-weight:600;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.4s;
    box-shadow:0 0 25px rgba(91,39,17,0.6);
}

button::before{
    content:'';
    position:absolute;
    bottom:-20px;
    left:10%;
    width:80%;
    height:40px;
    background:#5b2711;
    border-radius:50%;
    filter:blur(10px);
}

button:hover{
    transform:translateY(-3px);
    background:#6b3117;
}

/* LOGIN */

.login{
    text-align:center;
    margin-top:35px;
    color:#999;
    font-size:18px;
}

.login a{
    color:#3d89ff;
    text-decoration:none;
}

/* RESPONSIVO */

@media(max-width:1200px){

    .container{
        flex-direction:column;
        padding-top:140px;
    }

    .left h1{
        font-size:80px;
    }

    .logo{
        font-size:110px;
    }
}

@media(max-width:700px){

    body{
        overflow:auto;
    }

    .card{
        width:100%;
        padding:35px 25px;
    }

    .card h2{
        font-size:48px;
    }

    .left h1{
        font-size:60px;
    }

    .left p{
        font-size:18px;
    }
}

</style>
</head>
<body>

<div class="wave"></div>

<div class="container">

    <!-- ESQUERDA -->

    <div class="left">

        <div class="logo">
            <i class="fa-solid fa-ice-cream"></i>
        </div>

        <h1>Gelateria</h1>

        <div class="divider">
            <span></span>
            <i class="fa-regular fa-heart"></i>
            <span></span>
        </div>

        <p>
            SORVETES QUE DERRETEM<br>
            E CONQUISTAM
        </p>

    </div>

    <!-- CARD -->

    <div class="card">

        <h2>Cadastro</h2>

        <div class="top-divider">
            <span></span>
            <i class="fa-regular fa-heart"></i>
            <span></span>
        </div>

        <form>

            <div class="input-group">

                <label>Nome completo</label>

                <div class="input-box">
                    <i class="fa-regular fa-user"></i>
                    <input type="text"
                    placeholder="Digite seu nome completo">
                </div>

            </div>

            <div class="input-group">

                <label>E-mail</label>

                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email"
                    placeholder="Digite seu e-mail">
                </div>

            </div>

            <div class="input-group">

                <label>Senha</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password"
                    placeholder="Crie uma senha">

                    <i class="fa-regular fa-eye"></i>
                </div>

            </div>

            <div class="input-group">

                <label>Confirmar senha</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password"
                    placeholder="Confirme sua senha">

                    <i class="fa-regular fa-eye"></i>
                </div>

            </div>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <div class="login">
            Já tem uma conta?
            <a href="#">Entrar</a>
        </div>

    </div>

</div>

</body>
</html>
